<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowow — Thermal Fatigue Simulation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #06080f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'SF Mono', 'Courier New', monospace;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .title {
      color: rgba(180, 220, 255, 0.75);
      font-size: 13px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-family: 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ── Main viewer: flex row ─────────────────────────────── */
    .viewer {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 0;
      border-radius: 6px;
      box-shadow: 0 0 60px rgba(0,120,255,0.12), 0 0 0 1px rgba(0,180,255,0.15);
      background: #06080f;
      padding: 14px 14px 14px 0;
    }

    canvas { display: block; }

    /* ── Y-axis column ─────────────────────────────────────── */
    .col-y {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 4px;
      /* top offset = cycle-badge height; we handle via mt on y-axis-wrap */
    }
    .y-label-rot {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      color: rgba(180,210,255,0.35);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-align: center;
      white-space: nowrap;
      padding: 0 2px;
      height: 480px;           /* matches canvas height */
      margin-top: 20px;        /* matches cycle-badge height */
    }
    .y-ticks {
      position: relative;
      width: 28px;
      height: 480px;           /* exactly canvas height */
      margin-top: 20px;        /* matches cycle-badge height */
    }
    .y-ticks span {
      position: absolute;
      right: 4px;
      transform: translateY(-50%);
      color: rgba(180,210,255,0.45);
      font-size: 10px;
      text-align: right;
    }

    /* ── Center column: canvas + x-axis ───────────────────── */
    .col-main {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
    }
    .cycle-badge {
      color: rgba(255,180,80,0.85);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 0 4px 4px;
      text-align: left;
    }
    #main { border-radius: 2px; }

    .x-ticks {
      position: relative;
      width: 320px;            /* exactly canvas width */
      height: 16px;
      margin-top: 4px;
    }
    .x-ticks span {
      position: absolute;
      transform: translateX(-50%);
      color: rgba(180,210,255,0.45);
      font-size: 10px;
    }
    .x-label {
      color: rgba(180,210,255,0.35);
      font-size: 10px;
      letter-spacing: 1.5px;
      text-align: center;
      padding-top: 2px;
      width: 320px;
    }

    /* ── Colorbar column ───────────────────────────────────── */
    .col-cb {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      padding-left: 12px;
      padding-top: 20px;  /* align with canvas top */
    }
    .cb-unit {
      color: rgba(200,220,255,0.65);
      font-size: 10px;
      padding-left: 18px;
    }
    .cb-row {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 5px;
      flex: 1;
    }
    #cb { border-radius: 2px; display: block; }
    .cb-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: rgba(200,220,255,0.65);
      font-size: 10px;
      line-height: 1;
    }

    .subtitle {
      color: rgba(120,160,210,0.5);
      font-size: 11px;
      letter-spacing: 1.5px;
      font-family: 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="title">Temperature evolution during fatigue test</div>

  <div class="viewer" id="viewer">

    <!-- Y axis -->
    <div class="col-y">
      <div class="y-label-rot">y [mm]</div>
      <div class="y-ticks" id="axisY"></div>
    </div>

    <!-- Canvas + X axis -->
    <div class="col-main">
      <div class="cycle-badge" id="cycleBadge">N = 0</div>
      <canvas id="main" width="320" height="480"></canvas>
      <div class="x-ticks" id="axisX"></div>
      <div class="x-label">x [mm]</div>
    </div>

    <!-- Colorbar -->
    <div class="col-cb">
      <div class="cb-unit">°C</div>
      <div class="cb-row">
        <canvas id="cb" width="14" height="440"></canvas>
        <div class="cb-labels" id="cbLabels"></div>
      </div>
    </div>

  </div>

  <div class="subtitle">Notched specimen — fatigue loading simulation</div>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────────
const mainCanvas = document.getElementById('main');
const W = mainCanvas.width;   // 320
const H = mainCanvas.height;  // 480
const ctx = mainCanvas.getContext('2d');
const imgData = ctx.createImageData(W, H);
const px = imgData.data;

// ── Physical domain (mm) ──────────────────────────────────────
const X_MIN = 176, X_MAX = 208; // mm — 5 mm margin around specimen (181–203)
const Y_MIN = 0,   Y_MAX = 200;

// ── Temperature range ─────────────────────────────────────────
const T_MIN = 31.000;
const T_MAX = 33.755;

// ── Specimen geometry (from SVG provino.svg) ─────────────────
// Shape: smooth dumbbell / hourglass — S-curves on each side.
// Two smooth cubic bezier segments define the left boundary.
// Normalised coords: xn∈[0,1] (left→right), yn∈[0,1] (top SVG → bottom SVG)
// Derived from "provino 2.svg" — bounding box x:163.31–441.73 (w=278.42), y:129.51–696.42 (h=566.91)
//
// Left boundary — 4 segments from bottom (yn=1) up to top (yn=0):
//   M(168.35,696.42) s→(251.80,518.72) c→(257.86,402) c→(251.08,276.27) c→(163.31,129.51)
// Right boundary — 4 segments from top (yn=0) down to bottom (yn=1):
//   M(433.09,129.51) s→(342.25,277.50) c→(341.01,394.98) c→(360.43,522.32) c→(441.72,696.42)
const CX_MM  = 192;
const HALF_W = 11;   // specimen half-width in mm

function _bez(t, a, b, c, d) {
  const u = 1 - t;
  return u*u*u*a + 3*u*u*t*b + 3*u*t*t*c + t*t*t*d;
}

// Each segment: [P0, P1, P2, P3] in normalised [xn, yn]
const SEG_LEFT = [
  [[0.018,1.000],[0.018,1.000],[0.259,0.841],[0.318,0.687]],
  [[0.318,0.687],[0.340,0.627],[0.340,0.556],[0.340,0.481]],
  [[0.340,0.481],[0.340,0.386],[0.347,0.329],[0.315,0.259]],
  [[0.315,0.259],[0.256,0.129],[0.000,0.000],[0.000,0.000]],
];
const SEG_RIGHT = [
  [[0.969,0.000],[0.969,0.000],[0.667,0.131],[0.643,0.261]],
  [[0.643,0.261],[0.630,0.328],[0.638,0.374],[0.638,0.468]],
  [[0.638,0.468],[0.638,0.540],[0.673,0.635],[0.708,0.693]],
  [[0.708,0.693],[0.762,0.784],[1.000,1.000],[1.000,1.000]],
];

const LEFT_XN  = new Float32Array(H).fill(0);
const RIGHT_XN = new Float32Array(H).fill(1);

(function buildShape() {
  const N = 10000;
  for (const [p0,p1,p2,p3] of SEG_LEFT) {
    for (let i = 0; i <= N; i++) {
      const t  = i/N;
      const yn = _bez(t, p0[1],p1[1],p2[1],p3[1]);
      const xn = _bez(t, p0[0],p1[0],p2[0],p3[0]);
      const py = Math.round(yn*(H-1));
      if (py>=0 && py<H) LEFT_XN[py] = Math.max(LEFT_XN[py], xn);
    }
  }
  for (const [p0,p1,p2,p3] of SEG_RIGHT) {
    for (let i = 0; i <= N; i++) {
      const t  = i/N;
      const yn = _bez(t, p0[1],p1[1],p2[1],p3[1]);
      const xn = _bez(t, p0[0],p1[0],p2[0],p3[0]);
      const py = Math.round(yn*(H-1));
      if (py>=0 && py<H) RIGHT_XN[py] = Math.min(RIGHT_XN[py], xn);
    }
  }
  // Fill any sampling gaps by linear interpolation
  for (let py=1; py<H-1; py++) {
    if (LEFT_XN[py]===0  && LEFT_XN[py-1]>0  && LEFT_XN[py+1]>0)
      LEFT_XN[py]  = (LEFT_XN[py-1]  + LEFT_XN[py+1])  / 2;
    if (RIGHT_XN[py]===1 && RIGHT_XN[py-1]<1 && RIGHT_XN[py+1]<1)
      RIGHT_XN[py] = (RIGHT_XN[py-1] + RIGHT_XN[py+1]) / 2;
  }
})();

// Waist (narrowest cross-section): left xn≈0.347, right xn≈0.630, yn≈0.33
const NOTCH_XL = (CX_MM - HALF_W) + 0.347 * (2*HALF_W);  // ≈ 188.6 mm
const NOTCH_XR = (CX_MM - HALF_W) + 0.630 * (2*HALF_W);  // ≈ 194.9 mm
const NOTCH_Y  = 100;                                      // exactly 100 mm

function inSpecimen(mmX, mmY) {
  const xn = (mmX - (CX_MM - HALF_W)) / (2*HALF_W);
  if (xn < 0 || xn > 1) return false;
  const yn = 1 - mmY/Y_MAX;
  if (yn < 0 || yn > 1) return false;
  const py = Math.min(H-1, Math.max(0, Math.round(yn*(H-1))));
  return xn >= LEFT_XN[py] && xn <= RIGHT_XN[py];
}

// ── Inferno colormap ──────────────────────────────────────────
const INF_STOPS = [
  [0.000,   0,   0,   4],
  [0.130,  40,  11,  84],
  [0.258,  101, 21, 110],
  [0.387,  159, 42,  99],
  [0.516,  212, 72,  66],
  [0.645,  245,125,  21],
  [0.774,  250,193,  39],
  [0.903,  252,244, 147],
  [1.000,  252,255, 164],
];

function inferno(t) {
  t = Math.max(0, Math.min(1, t));
  let i = 0;
  while (i < INF_STOPS.length - 2 && INF_STOPS[i + 1][0] < t) i++;
  const [t0, r0, g0, b0] = INF_STOPS[i];
  const [t1, r1, g1, b1] = INF_STOPS[i + 1];
  const f = (t - t0) / (t1 - t0);
  return [
    r0 + f * (r1 - r0) | 0,
    g0 + f * (g1 - g0) | 0,
    b0 + f * (b1 - b0) | 0,
  ];
}

// ── Temperature field ─────────────────────────────────────────
function gauss(x, y, cx, cy, rx, ry) {
  return Math.exp(-((x - cx) ** 2 / (2 * rx * rx) + (y - cy) ** 2 / (2 * ry * ry)));
}

function temperature(mmX, mmY, phase /* 0..1 */) {
  // Base: uniform warm background + slight vertical gradient
  const base = T_MIN + 1.1 + 0.15 * (mmY / Y_MAX)
             - 0.22 * Math.pow((mmY - NOTCH_Y) / NOTCH_Y, 2);

  // ── Notch root hot spots (at waist of S-curve)
  const notchIntensity = (T_MAX - T_MIN - 0.3) * 0.5 * Math.pow(phase, 0.6);

  const hNL = notchIntensity * gauss(mmX, mmY, NOTCH_XL, NOTCH_Y, 2.5, 3);
  const hNR = notchIntensity * gauss(mmX, mmY, NOTCH_XR, NOTCH_Y, 2.5, 3);

  // ── Central gauge hot band (appears at higher phase)
  const bandIntensity = (T_MAX - T_MIN - 0.8) * Math.max(0, phase - 0.45) * 1.8;
  const hBand = bandIntensity * gauss(mmX, mmY, CX_MM, NOTCH_Y, 3, 5);

  // ── Warm halo bridging both notch roots (stress field)
  const hHalo = notchIntensity * 0.55 * gauss(mmX, mmY, CX_MM, NOTCH_Y, 7, 9);

  // ── Slight warming of gauge section at mid-phase
  const gaugeWarm = 0.4 * Math.min(phase * 2, 1) *
    gauss(mmX, mmY, CX_MM, NOTCH_Y, 3, 35);

  // Live noise (subtle texture, like real IR camera)
  const noise = 0;  // static version; animated noise added in render loop

  return base + hNL + hNR + hBand + hHalo + gaugeWarm + noise;
}

// ── Precompute mask ───────────────────────────────────────────
const mask    = new Uint8Array(W * H);
const mmXArr  = new Float32Array(W * H);
const mmYArr  = new Float32Array(W * H);

for (let y = 0; y < H; y++) {
  for (let x = 0; x < W; x++) {
    const mmX = X_MIN + (x / W) * (X_MAX - X_MIN);
    const mmY = Y_MAX - (y / H) * (Y_MAX - Y_MIN);  // canvas Y is flipped
    const idx  = y * W + x;
    mmXArr[idx] = mmX;
    mmYArr[idx] = mmY;
    mask[idx]   = inSpecimen(mmX, mmY) ? 1 : 0;
  }
}

// ── Colorbar ──────────────────────────────────────────────────
const cbCanvas = document.getElementById('cb');
const CB_H     = 440;
const CB_W     = 14;
cbCanvas.height = CB_H;
const cbCtx    = cbCanvas.getContext('2d');
const cbImg    = cbCtx.createImageData(CB_W, CB_H);
for (let i = 0; i < CB_H; i++) {
  const frac = 1 - i / (CB_H - 1); // top = hot (frac=1), bottom = cold (frac=0)
  const [r, g, b] = inferno(frac);
  for (let x = 0; x < CB_W; x++) {
    const off = (i * CB_W + x) * 4;
    cbImg.data[off]     = r;
    cbImg.data[off + 1] = g;
    cbImg.data[off + 2] = b;
    cbImg.data[off + 3] = 255;
  }
}
cbCtx.putImageData(cbImg, 0, 0);

// Tick labels: hot at top, cold at bottom (column-reverse handled by flex)
const cbLabels = document.getElementById('cbLabels');
const nTicks   = 9;
for (let i = nTicks; i >= 0; i--) {
  const frac = i / nTicks;
  const temp = T_MIN + frac * (T_MAX - T_MIN);
  const span = document.createElement('span');
  span.textContent = temp.toFixed(3);
  cbLabels.appendChild(span);
}

// ── Axis labels (absolutely positioned at correct coordinates) ──
const axisY = document.getElementById('axisY');
[200, 175, 150, 125, 100, 75, 50, 25, 0].forEach(v => {
  const s = document.createElement('span');
  s.textContent = v;
  // top% = fraction from canvas top = (Y_MAX - v) / (Y_MAX - Y_MIN)
  s.style.top = ((Y_MAX - v) / (Y_MAX - Y_MIN) * 100) + '%';
  axisY.appendChild(s);
});

// Labels 170–220 equally spaced, mapped to specimen edges (181–203 mm physical)
const axisX = document.getElementById('axisX');
const specL = CX_MM - HALF_W, specR = CX_MM + HALF_W;
[170, 180, 190, 200, 210, 220].forEach(label => {
  const pos = specL + (label - 170) / (220 - 170) * (specR - specL);
  const s = document.createElement('span');
  s.textContent = label;
  s.style.left = ((pos - X_MIN) / (X_MAX - X_MIN) * 100) + '%';
  axisX.appendChild(s);
});

// ── Animation ─────────────────────────────────────────────────
const PERIOD  = 7000;   // ms per full fatigue cycle
const N_MAX   = 200000; // max cycles displayed
let   startMs = null;

function render(ts) {
  if (!startMs) startMs = ts;
  const elapsed = ts - startMs;
  const loopT   = (elapsed % PERIOD) / PERIOD;  // 0..1, loops

  // Phase: 0 = Start, 1 = End (triangular wave → forward and back)
  const phase = loopT < 0.6
    ? loopT / 0.6                     // ramp up
    : 1 - (loopT - 0.6) / 0.4;       // ramp back down

  // Simulated cycle count
  const N = Math.round(phase * N_MAX);
  document.getElementById('cycleBadge').textContent =
    'N = ' + N.toLocaleString('en-US');

  // Subtle per-frame noise
  const noiseAmp = 0.04;
  const nt = ts * 0.001;

  for (let i = 0; i < W * H; i++) {
    const off = i * 4;
    if (!mask[i]) {
      // Outside specimen: near-black background
      px[off]     = 6;
      px[off + 1] = 4;
      px[off + 2] = 12;
      px[off + 3] = 255;
      continue;
    }
    const mmX = mmXArr[i];
    const mmY = mmYArr[i];
    const temp = temperature(mmX, mmY, phase) +
      noiseAmp * Math.sin(nt * 3.1 + mmX * 0.4) * Math.cos(nt * 2.3 + mmY * 0.3);
    const frac = (temp - T_MIN) / (T_MAX - T_MIN);
    const [r, g, b] = inferno(frac);
    px[off]     = r;
    px[off + 1] = g;
    px[off + 2] = b;
    px[off + 3] = 255;
  }

  ctx.putImageData(imgData, 0, 0);
  requestAnimationFrame(render);
}

requestAnimationFrame(render);
</script>
</body>
</html>
